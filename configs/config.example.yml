# ===========================================
# 应用配置 (YAML - 支持热重载)
# 敏感配置请在 .env 文件中设置
# ===========================================

APP:
  APP_NAME: "gin-scaffold"
  # CORS 跨域相关
  CORS:
    ALLOW_ORIGINS: ["*"] # 允许的源，生产环境应指定具体域名，如 ["https://yourdomain.com"]
    ALLOW_METHODS: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"] # 允许的HTTP方法
    ALLOW_HEADERS: ["Origin", "Content-Type", "Accept", "Authorization", "X-Requested-With"] # 允许的请求头
    EXPOSE_HEADERS: ["Content-Length", "Authorization"] # 暴露的响应头
    ALLOW_CREDENTIALS: true # 是否允许携带凭证
    MAX_AGE: 12 # 预检请求缓存时间（小时）
  # 邮箱相关 (敏感信息在 .env 中配置)
  EMAIL:
    EMAIL_TYPE: "qq" # 支持的邮箱类型: qq, gmail, outlook
  # JWT 认证相关 (SECRET 在 .env 中配置)
  JWT:
    EXPIRE_TIME: 2 # Token 有效期（小时）
    REFRESH_EXPIRE: 48 # 刷新Token有效期（小时）
  # 用户角色相关 (敏感信息在 .env 中配置)
  USER:
    SUPER_ADMIN_NICKNAME: "超级管理员" # 管理员昵称

# ===========================================
# 数据库相关 (连接信息在 .env 中配置)
# ===========================================
DATABASE:
  DB_DIALECT: "mysql" # 数据库类型, 可选值: postgres, mysql

# ===========================================
# Redis 相关 (连接信息在 .env 中配置)
# ===========================================
REDIS:
  # 连接池配置（重启时生效）
  POOL_SIZE: 10        # 最大连接池大小
  MIN_IDLE_CONNS: 5    # 最小空闲连接数
  DIAL_TIMEOUT: 10     # 连接超时（秒）
  READ_TIMEOUT: 1      # 读取超时（秒）
  WRITE_TIMEOUT: 2     # 写入超时（秒）

# ===========================================
# 日志相关
# ===========================================
LOG:
  LOG_FILE_PATH: ".logs/"
  LOG_FILE_NAME: "app.log"
  LOG_TIMESTAMP_FMT: "2006-01-02 15:04:05"
  LOG_MAX_AGE: "72"
  LOG_ROTATION_TIME: "24"
  LOG_LEVEL: "INFO"

# ===========================================
# 消息队列相关
# ===========================================
QUEUE:
  TYPE: "channel"                       # 队列类型: "channel"(内存，无需外部服务) 或 "rabbitmq"
  RABBITMQ:
    URL: "amqp://guest:guest@localhost:5672/"
    EXCHANGE: "transcode"
    EXCHANGE_TYPE: "direct"
    PREFETCH_COUNT: 1

# ===========================================
# AI 服务相关 (API Keys 在 .env 中配置)
# ===========================================
AI:
  PROMPT:
    DIR: "./configs/prompts" # 模板文件目录
  PROVIDERS:
    openai:
      ENABLED: true # 是否启用该提供商
      INSTANCES: # 多个OpenAI兼容实例
        # 阿里云百炼 DeepSeek
        - NAME: "dashscope"
          ENABLED: false
          BASE_URL: "https://dashscope.aliyuncs.com/compatible-mode/v1"
          KEYS:
            - "YOUR_API_KEY"
          MODELS:
            - "deepseek-r1-distill-llama-70b"
          MAX_TOKENS: 16384       # 最大输出token数量
          TEMPERATURE: 0.45       # 采样温度 (0.0-2.0)
          TOP_P: 0.90             # 核采样 (0.0-1.0)
          TIMEOUT: 720
          MAX_RETRIES: 1
          RATE_LIMIT: "60/min"

        # 硅基流动 DeepSeek
        - NAME: "siliconflow"
          ENABLED: true
          BASE_URL: "https://api.siliconflow.cn/v1"
          KEYS:
            - "YOUR_API_KEY"
          MODELS:
            - "deepseek-ai/DeepSeek-V3.2-Exp"
          MAX_TOKENS: 32768       # 最大输出token数量
          TEMPERATURE: 0.45       # 采样温度 (0.0-2.0)
          TOP_P: 0.90             # 核采样 (0.0-1.0)
          TIMEOUT: 720            # AI响应超时时间（秒）
          MAX_RETRIES: 1
          RATE_LIMIT: "60/min"

    gemini:
      ENABLED: false # 是否启用该提供商
      INSTANCES:
        # Google Gemini
        - NAME: "official"
          ENABLED: true # 是否启用此实例
          BASE_URL: "https://generativelanguage.googleapis.com"
          KEYS:
            - "YOUR_API_KEY"
          MODELS:
            - "gemini-2.5-pro"
            - "gemini-2.5-flash"
          MAX_TOKENS: 32768       # 最大输出 token 数量
          TEMPERATURE: 0.40       # 采样温度 (0.0-2.0)
          TOP_P: 0.90             # 核采样 (0.0-1.0)
          TOP_K: 40               # 限制候选词数量
          TIMEOUT: 1080
          MAX_RETRIES: 1
          RATE_LIMIT: "60/min"

# ===========================================
# Torrent 下载配置 (支持热重载)
# ===========================================
TORRENT:
  DOWNLOAD_DIR: "./download"      # 下载目录
  UPLOAD_RATE_LIMIT: 0            # 上传速度限制 (KB/s)，0=不限制
  DOWNLOAD_RATE_LIMIT: 0          # 下载速度限制 (KB/s)，0=不限制
  ENABLE_SEEDING: true            # 是否启用做种
  LISTEN_PORT: 42069              # BT P2P 监听端口

# ===========================================
# 云存储配置 (可选)
# 敏感配置请在 .env 中设置: GCS_CREDENTIALS_FILE, GCS_BUCKET_NAME
# ===========================================
CLOUD_STORAGE:
  ENABLED: false                                    # 是否启用云存储上传
  PROVIDER: "gcs"                                   # 云存储提供商: gcs 或 s3
  CREDENTIALS_FILE: "./credentials/gcs-sa.json"    # GCS Service Account JSON 文件路径
  BUCKET_NAME: "your-bucket-name"                  # GCS Bucket 名称
  SIGNED_URL_EXPIRE_HOURS: 3                       # Signed URL 过期时间（小时）
  PATH_PREFIX: "torrents"                          # 对象存储路径前缀
  PUBLIC_URL: ""                                   # 公共访问的基础URL，配置后将直接返回直链而不进行预签名
  # S3 专用
  REGION: "us-east-1"                              # AWS 区域
  ACCESS_KEY_ID: "your-access-key"
  SECRET_ACCESS_KEY: "your-secret-key"
  ENDPOINT: "https://s3.example.com"               # S3/Ceph 自定义端点
  ADDRESSING_STYLE: "path"                         # path 或 virtual
  SIGNATURE_VERSION: "v4"                          # v4 或 s3(v2)

# ===========================================
# TMDB API 配置 (可选)
# ===========================================
TMDB:
  API_KEY: ""                                      # TMDB API Key (从 https://www.themoviedb.org/settings/api 获取)
