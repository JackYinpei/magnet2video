# =====================================================================
# magnet2video — 应用默认配置
# =====================================================================
# 这个文件被打进 Docker 镜像里，作为默认值。
# 所有「敏感」或「随部署变化」的值都通过 .env 文件 / 环境变量覆盖，
# 不要在这里写真实密码/密钥。映射关系见 .env.example。
# =====================================================================

APP:
  APP_NAME: "magnet2video"
  APP_HOST: "0.0.0.0"     # ENV: APP_HOST
  APP_PORT: "8080"        # ENV: APP_PORT
  MODE: "all"             # 实际值由命令行 -mode 覆盖（compose 里设置）
  WORKER_ID: ""           # ENV: WORKER_ID（仅 worker 模式有意义）
  CORS:
    ALLOW_ORIGINS: ["*"]
    ALLOW_METHODS: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
    ALLOW_HEADERS: ["Origin", "Content-Type", "Accept", "Authorization", "X-Requested-With"]
    EXPOSE_HEADERS: ["Content-Length", "Authorization"]
    ALLOW_CREDENTIALS: true
    MAX_AGE: 12
  EMAIL:
    EMAIL_TYPE: "qq"
    FROM_EMAIL: ""        # ENV: FROM_EMAIL
    EMAIL_SMTP: ""        # ENV: EMAIL_SMTP
  JWT:
    SECRET: ""            # ENV: JWT_SECRET (必填)
    EXPIRE_TIME: 2
    REFRESH_EXPIRE: 48
  USER:
    SUPER_ADMIN_NICKNAME: "超级管理员"
    SUPER_ADMIN_EMAIL: ""    # ENV: SUPER_ADMIN_EMAIL (server 模式必填)
    SUPER_ADMIN_PASSWORD: "" # ENV: SUPER_ADMIN_PASSWORD (server 模式必填)

DATABASE:
  DB_DIALECT: "mysql"     # ENV: DB_DIALECT
  DB_HOST: ""             # ENV: DB_HOST (server 模式必填)
  DB_PORT: "3306"         # ENV: DB_PORT
  DB_USER: "root"         # ENV: DB_USER
  DB_PSW: ""              # ENV: DB_PASSWORD (server 模式必填)
  DB_NAME: "magnet2video" # ENV: DB_NAME

REDIS:
  REDIS_HOST: ""          # ENV: REDIS_HOST (server 模式必填，如 "redis")
  REDIS_PORT: "6379"      # ENV: REDIS_PORT
  REDIS_PSW: ""           # ENV: REDIS_PASSWORD
  REDIS_DB: "0"           # ENV: REDIS_DB
  POOL_SIZE: 10
  MIN_IDLE_CONNS: 5
  DIAL_TIMEOUT: 10
  READ_TIMEOUT: 1
  WRITE_TIMEOUT: 2

LOG:
  LOG_FILE_PATH: ".logs/"
  LOG_FILE_NAME: "app.log"
  LOG_TIMESTAMP_FMT: "2006-01-02 15:04:05"
  LOG_MAX_AGE: "72"
  LOG_ROTATION_TIME: "24"
  LOG_LEVEL: "INFO"

QUEUE:
  TYPE: "rabbitmq"        # ENV: QUEUE_TYPE ("channel" 或 "rabbitmq")
  RABBITMQ:
    URL: ""               # ENV: RABBITMQ_URL (必填，分离部署用)
    EXCHANGE: "magnet2video"
    EXCHANGE_TYPE: "direct"
    PREFETCH_COUNT: 1

# AI 提供商配置 —— API key 留空占位，需要时再填
AI:
  PROMPT:
    DIR: "./configs/prompts"
  PROVIDERS:
    openai:
      ENABLED: false
      INSTANCES:
        - NAME: "siliconflow"
          ENABLED: false
          BASE_URL: "https://api.siliconflow.cn/v1"
          KEYS: [""]
          MODELS: ["deepseek-ai/DeepSeek-V3.2-Exp"]
          MAX_TOKENS: 32768
          TEMPERATURE: 0.45
          TOP_P: 0.90
          TIMEOUT: 720
          MAX_RETRIES: 1
          RATE_LIMIT: "60/min"

TORRENT:
  DOWNLOAD_DIR: "./download"
  UPLOAD_RATE_LIMIT: 100
  DOWNLOAD_RATE_LIMIT: 0
  ENABLE_SEEDING: true
  LISTEN_PORT: 42069

TRANSCODE:
  FFMPEG_PATH: "ffmpeg"
  FFPROBE_PATH: "ffprobe"
  WORKER_COUNT: 1
  DEFAULT_CODEC: "h264"
  DEFAULT_PRESET: "medium"
  DEFAULT_CRF: 23
  DEFAULT_AUDIO_CODEC: "aac"

CLOUD_STORAGE:
  ENABLED: true                    # ENV: CLOUD_STORAGE_ENABLED
  PROVIDER: "s3"                   # ENV: CLOUD_STORAGE_PROVIDER
  BUCKET_NAME: ""                  # ENV: S3_BUCKET_NAME (必填)
  SIGNED_URL_EXPIRE_HOURS: 3
  PATH_PREFIX: "torrents"
  PUBLIC_URL: ""                   # ENV: CLOUD_STORAGE_PUBLIC_URL
  # GCS 用
  CREDENTIALS_FILE: ""             # ENV: GCS_CREDENTIALS_FILE
  # S3 / S3 兼容用
  REGION: "us-east-1"              # ENV: S3_REGION
  ACCESS_KEY_ID: ""                # ENV: S3_ACCESS_KEY_ID (必填)
  SECRET_ACCESS_KEY: ""            # ENV: S3_SECRET_ACCESS_KEY (必填)
  ENDPOINT: ""                     # ENV: S3_ENDPOINT
  ADDRESSING_STYLE: "path"         # ENV: S3_ADDRESSING_STYLE
  SIGNATURE_VERSION: "s3"          # ENV: S3_SIGNATURE_VERSION

TMDB:
  API_KEY: ""
