# ==========================================================
# SERVER MODE 配置 (mode=server)
# ==========================================================
# 说明:
#   - 只运行 API + DB + Redis + worker-events/heartbeat 消费者
#   - 不执行下载/转码/云上传 (这些由 worker 负责)
#   - RabbitMQ 必须可达 (5672)；推荐使用独立 vhost + 独立账号
# ==========================================================

APP:
  APP_NAME: "magnet2video"
  APP_HOST: "0.0.0.0"
  APP_PORT: "8080"
  MODE: "server"          # 关键: 标识此实例为 server
  WORKER_ID: ""           # server 模式下无意义
  CORS:
    ALLOW_ORIGINS: ["*"]
    ALLOW_METHODS: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
    ALLOW_HEADERS: ["Origin", "Content-Type", "Accept", "Authorization", "X-Requested-With"]
    EXPOSE_HEADERS: ["Content-Length", "Authorization"]
    ALLOW_CREDENTIALS: true
    MAX_AGE: 12
  JWT:
    EXPIRE_TIME: 2
    REFRESH_EXPIRE: 48
  USER:
    SUPER_ADMIN_NICKNAME: "超级管理员"

DATABASE:
  DB_DIALECT: "mysql"     # server 必需

REDIS:
  POOL_SIZE: 10
  MIN_IDLE_CONNS: 5
  DIAL_TIMEOUT: 10
  READ_TIMEOUT: 1
  WRITE_TIMEOUT: 2

LOG:
  LOG_FILE_PATH: ".logs/"
  LOG_FILE_NAME: "server.log"
  LOG_TIMESTAMP_FMT: "2006-01-02 15:04:05"
  LOG_MAX_AGE: "72"
  LOG_ROTATION_TIME: "24"
  LOG_LEVEL: "INFO"

QUEUE:
  TYPE: "rabbitmq"        # 分离部署必须用 rabbitmq
  RABBITMQ:
    URL: "amqp://worker:CHANGE_ME@rabbitmq-host:5672/magnet"
    EXCHANGE: "magnet2video"
    EXCHANGE_TYPE: "direct"
    PREFETCH_COUNT: 1

TORRENT:
  DOWNLOAD_DIR: "./download"   # server 只会用于 ParseMagnet 解析元数据
  LISTEN_PORT: 42069

CLOUD_STORAGE:
  ENABLED: true           # 必须启用才能让前端从 S3 播放文件
  PROVIDER: "s3"
  BUCKET_NAME: "your-bucket"
  SIGNED_URL_EXPIRE_HOURS: 3
  PATH_PREFIX: "torrents"
  REGION: "us-east-1"
  ACCESS_KEY_ID: "your-access-key"
  SECRET_ACCESS_KEY: "your-secret-key"
  ENDPOINT: ""
  ADDRESSING_STYLE: "path"
  SIGNATURE_VERSION: "v4"

TMDB:
  API_KEY: ""
