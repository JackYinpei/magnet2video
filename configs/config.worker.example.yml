# ==========================================================
# WORKER MODE 配置 (mode=worker)
# ==========================================================
# 说明:
#   - 只运行 torrent 下载 + 转码 + 云上传 consumer
#   - 不需要 DB / Redis / Gin
#   - 必须能主动连接 server 的 RabbitMQ (出站 5672)
#   - 必须配置 S3/GCS 凭据 (worker 直接上传)
# ==========================================================

APP:
  APP_NAME: "magnet2video-worker"
  MODE: "worker"          # 关键
  WORKER_ID: "home-worker-01"   # 建议显式命名,便于在状态面板看清是哪台机器

LOG:
  LOG_FILE_PATH: ".logs/"
  LOG_FILE_NAME: "worker.log"
  LOG_TIMESTAMP_FMT: "2006-01-02 15:04:05"
  LOG_MAX_AGE: "72"
  LOG_ROTATION_TIME: "24"
  LOG_LEVEL: "INFO"

QUEUE:
  TYPE: "rabbitmq"
  RABBITMQ:
    URL: "amqp://worker:CHANGE_ME@SERVER_PUBLIC_IP:5672/magnet"
    EXCHANGE: "magnet2video"
    EXCHANGE_TYPE: "direct"
    PREFETCH_COUNT: 1

TORRENT:
  DOWNLOAD_DIR: "./download"    # worker 本地下载路径,务必挂载在大容量磁盘
  UPLOAD_RATE_LIMIT: 0
  DOWNLOAD_RATE_LIMIT: 0
  ENABLE_SEEDING: true
  LISTEN_PORT: 42069

TRANSCODE:
  FFMPEG_PATH: "ffmpeg"
  FFPROBE_PATH: "ffprobe"
  WORKER_COUNT: 1
  DEFAULT_CODEC: "h264"
  DEFAULT_PRESET: "medium"
  DEFAULT_CRF: 23
  DEFAULT_AUDIO_CODEC: "aac"

CLOUD_STORAGE:
  ENABLED: true
  PROVIDER: "s3"
  BUCKET_NAME: "your-bucket"
  SIGNED_URL_EXPIRE_HOURS: 3
  PATH_PREFIX: "torrents"
  REGION: "us-east-1"
  ACCESS_KEY_ID: "your-access-key"
  SECRET_ACCESS_KEY: "your-secret-key"
  ENDPOINT: ""
  ADDRESSING_STYLE: "path"
  SIGNATURE_VERSION: "v4"
