# Worker-mode compose. 在任意一台机器上跑下载/转码/上传。
# 旁边必须有 .env (从仓库的 .env.example 复制)，关键字段:
#   WORKER_ID=...                                 给这台 worker 起个名
#   RABBITMQ_URL=amqp://user:pass@<服务器公网IP>:5672/magnet
#   S3_*  /  CLOUD_STORAGE_*                      和 server 一致

services:
  app:
    image: ghcr.io/jackyinpei/magnet2video:latest
    container_name: magnet2video-worker
    command: ["./server", "-mode=worker"]
    env_file:
      - .env
    ports:
      - "42069:42069"
      - "42069:42069/udp"
    volumes:
      - ./.logs:/app/.logs
      - ./download:/app/download
    restart: unless-stopped
