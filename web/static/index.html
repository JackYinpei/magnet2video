<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnet Video</title>
    <meta name="description" content="Magnet Video - 磁力链接视频下载与播放平台">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="logo">📺 Magnet Video</div>
            <div class="nav-links">
                <a href="#" class="nav-link active" data-page="library">媒体库</a>
                <a href="#" class="nav-link" data-page="public">公共资源</a>
                <a href="#" class="nav-link" data-page="add">添加</a>
                <a href="#" class="nav-link" data-page="downloads">下载</a>
            </div>
            <div class="nav-user" id="nav-user">
                <!-- 动态渲染用户信息或登录按钮 -->
            </div>
        </nav>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 登录页面 -->
            <div id="page-login" class="page auth-page">
                <div class="auth-container">
                    <h2>登录</h2>
                    <form id="login-form" class="auth-form">
                        <div class="form-group">
                            <label>邮箱</label>
                            <input type="email" id="login-email" placeholder="请输入邮箱" required>
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="login-password" placeholder="请输入密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">登录</button>
                        <p class="auth-switch">
                            还没有账号？<a href="#" id="goto-register">立即注册</a>
                        </p>
                    </form>
                </div>
            </div>

            <!-- 注册页面 -->
            <div id="page-register" class="page auth-page">
                <div class="auth-container">
                    <h2>注册</h2>
                    <form id="register-form" class="auth-form">
                        <div class="form-group">
                            <label>邮箱</label>
                            <input type="email" id="register-email" placeholder="请输入邮箱" required>
                        </div>
                        <div class="form-group">
                            <label>昵称</label>
                            <input type="text" id="register-nickname" placeholder="请输入昵称 (至少2个字符)" required
                                minlength="2">
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="register-password" placeholder="请输入密码 (至少6个字符)" required
                                minlength="6">
                        </div>
                        <div class="form-group">
                            <label>确认密码</label>
                            <input type="password" id="register-confirm" placeholder="请再次输入密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">注册</button>
                        <p class="auth-switch">
                            已有账号？<a href="#" id="goto-login">返回登录</a>
                        </p>
                    </form>
                </div>
            </div>

            <!-- 媒体库页面 (海报墙) -->
            <div id="page-library" class="page">
                <h2>我的媒体库</h2>
                <div id="library-grid" class="poster-grid">
                    <div class="empty-state">
                        <p>暂无媒体，点击"添加"开始下载</p>
                    </div>
                </div>
            </div>

            <!-- 公共资源页面 -->
            <div id="page-public" class="page">
                <h2>公共资源</h2>
                <p class="page-description">浏览所有用户公开分享的资源</p>
                <div id="public-grid" class="poster-grid">
                    <div class="empty-state">
                        <p>暂无公开资源</p>
                    </div>
                </div>
            </div>

            <!-- 添加页面 -->
            <div id="page-add" class="page">
                <h2>添加磁力链接</h2>
                <div class="add-form">
                    <div class="form-group">
                        <label>磁力链接</label>
                        <textarea id="magnet-input" placeholder="magnet:?xt=urn:btih:..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>自定义 Tracker (可选，每行一个)</label>
                        <textarea id="tracker-input" placeholder="udp://tracker.example.com:1337/announce"></textarea>
                    </div>
                    <button id="parse-btn" class="btn btn-primary">解析</button>
                </div>

                <!-- 文件选择区域 -->
                <div id="file-selection" class="file-selection hidden">
                    <h3 id="torrent-name">种子名称</h3>
                    <p id="torrent-size">总大小: 0 MB</p>
                    <div class="file-actions">
                        <button id="select-all-btn" class="btn btn-sm">全选</button>
                        <button id="select-none-btn" class="btn btn-sm">取消全选</button>
                        <button id="select-video-btn" class="btn btn-sm">仅视频</button>
                    </div>
                    <div id="file-list" class="file-list"></div>
                    <div class="form-actions">
                        <button id="download-btn" class="btn btn-primary">开始下载</button>
                        <button id="cancel-btn" class="btn">取消</button>
                    </div>
                </div>
            </div>

            <!-- 下载页面 -->
            <div id="page-downloads" class="page">
                <h2>下载任务</h2>
                <div id="downloads-list" class="downloads-list">
                    <div class="empty-state">
                        <p>暂无下载任务</p>
                    </div>
                </div>
            </div>

            <!-- 播放器页面 -->
            <div id="page-player" class="page">
                <div class="player-header">
                    <button id="back-btn" class="btn">← 返回</button>
                    <h2 id="player-title">正在播放</h2>
                    <div class="player-share" id="player-share">
                        <!-- 分享按钮，仅对自己的资源显示 -->
                    </div>
                </div>
                <div class="player-container">
                    <video id="video-player" controls>
                        Your browser does not support the video tag.
                    </video>
                </div>
                <div id="player-files" class="player-files"></div>
            </div>

            <!-- 个人资料页面 -->
            <div id="page-profile" class="page">
                <h2>个人资料</h2>
                <div class="profile-container">
                    <div class="profile-info">
                        <div class="avatar-section">
                            <div class="avatar" id="profile-avatar">👤</div>
                        </div>
                        <div class="profile-details">
                            <p><strong>邮箱:</strong> <span id="profile-email">-</span></p>
                            <p><strong>昵称:</strong> <span id="profile-nickname">-</span></p>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button id="logout-btn" class="btn btn-danger">退出登录</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast 通知 -->
    <div id="toast" class="toast hidden"></div>

    <!-- 加载遮罩 -->
    <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>加载中...</p>
    </div>

    <script src="app.js"></script>
</body>

</html>
