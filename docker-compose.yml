version: '3.8'

services:
  # RabbitMQ 消息队列 (可选，仅当 QUEUE.TYPE=rabbitmq 时需要)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  app:
    build: .
    container_name: gin-app
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
      - "42069:42069"      # BT P2P TCP
      - "42069:42069/udp"  # BT P2P UDP
    volumes:
      - ./download:/app/download
      - ./configs:/app/configs
      - ./.logs:/app/.logs
    env_file:
      - .docker.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      # 如果使用 rabbitmq，取消下面注释
      # rabbitmq:
      #   condition: service_healthy
    restart: on-failure
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    env_file:
      - .docker.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-gin-scaffold_db}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: redis-cache
    env_file:
      - .docker.env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
